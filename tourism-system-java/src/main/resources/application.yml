server:
  port: 8080

spring:
  application:
    name: tourism-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TOURISM_DB_URL:jdbc:mysql://localhost:3306/tourism_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${TOURISM_DB_USERNAME:root}
    password: ${TOURISM_DB_PASSWORD:608052}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
  data:
    redis:
      host: localhost
      port: 6379
      password:               # 若 Redis 无密码则留空
      database: 0
      timeout: 10s
      lettuce:
        pool:
          min-idle: 2
          max-active: 10
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.tourism.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${TOURISM_JWT_SECRET:tourism-system-secret-key-2024-very-long-and-secure}
  expiration: ${TOURISM_JWT_EXPIRATION:86400000}

app:
  cors:
    allowed-origins: ${TOURISM_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
  upload-dir: ${TOURISM_UPLOAD_DIR:${user.dir}/../tourism-system/backend/uploads}
  aigc:
    python-command: ${TOURISM_AIGC_PYTHON:python3}
  amap:
    enabled: ${TOURISM_AMAP_ENABLED:true}
    base-url: ${TOURISM_AMAP_BASE_URL:https://restapi.amap.com}
    web-key: ${TOURISM_AMAP_WEB_KEY:}
    js-key: ${TOURISM_AMAP_JS_KEY:}
    js-security-code: ${TOURISM_AMAP_JS_SECURITY_CODE:}
  navigation:
    default-provider: ${TOURISM_NAVIGATION_PROVIDER:auto}
    amap:
      enabled: ${TOURISM_AMAP_ENABLED:true}
      key: ${TOURISM_AMAP_KEY:}
      base-url: ${TOURISM_AMAP_BASE_URL:https://restapi.amap.com}
      timeout-ms: ${TOURISM_AMAP_TIMEOUT_MS:5000}

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.tourism: DEBUG
    org.springframework.security: INFO
