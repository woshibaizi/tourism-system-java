spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-tourism-jwt-secret-key-1234567890
  expiration: 86400000

app:
  cors:
    allowed-origins: http://localhost:3000
  upload-dir: ${java.io.tmpdir}/tourism-system-test-uploads
  aigc:
    python-command: python3
  amap:
    enabled: false
  navigation:
    default-provider: auto
    amap:
      enabled: true
      key:
      base-url: https://restapi.amap.com
      timeout-ms: 2000
  agent:
    base-url: http://127.0.0.1:9000
    connect-timeout-ms: 1000
    read-timeout-ms: 1000
